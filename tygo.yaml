# Generates TypeScript types from the Go wire DTOs so the frontend and backend
# can't drift. Run `make gen-ts`; CI checks the output is committed and current.
type_mappings:
  time.Time: "string"
  json.RawMessage: "unknown"
packages:
  - path: "github.com/RenanQueiroz/hina-agent/internal/wire"
    output_path: "web/src/lib/api.gen.ts"
    frontmatter: |
      // Code generated by tygo from internal/wire. DO NOT EDIT.
      /* eslint-disable */
  - path: "github.com/RenanQueiroz/hina-agent/internal/events"
    output_path: "web/src/lib/events.gen.ts"
    include_files: ["events.go"]
    frontmatter: |
      // Code generated by tygo from internal/events. DO NOT EDIT.
      /* eslint-disable */
