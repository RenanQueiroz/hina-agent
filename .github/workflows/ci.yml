name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the default GITHUB_TOKEN is read-only. These jobs only build
# and test — they never need write access, secrets, or PR-comment scope.
permissions:
  contents: read

# The control plane is CGo-free on purpose, so the Windows/macOS jobs need no
# C toolchain. Local ONNX adapters (later phases) will add a CGo build behind a
# build tag with its own job.
env:
  CGO_ENABLED: "0"

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    # Only run for pushes and same-repo PRs. Pull requests opened from a fork
    # are skipped, so forked PRs can never execute these jobs (defends against
    # pwn-request / poisoned-pipeline attacks). Belt-and-suspenders: also enable
    # "Require approval for all external collaborators/forks" in repo settings.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.x"
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Migrate smoke (up / down / up, cross-platform)
        run: |
          go run ./cmd/hina migrate
          go run ./cmd/hina migrate down all
          go run ./cmd/hina migrate
        shell: bash
      - name: Doctor smoke (non-interactive)
        run: go run ./cmd/hina doctor --json
      - name: Server smoke (start the real binary, /readyz, stop, no orphan)
        shell: bash
        run: |
          set -euo pipefail
          # Isolate app dirs (per-OS bases) so the smoke never touches a profile.
          ROOT="$(mktemp -d)"
          export XDG_CONFIG_HOME="$ROOT/config" XDG_CACHE_HOME="$ROOT/cache" XDG_DATA_HOME="$ROOT/data"
          export AppData="$ROOT/appdata" LocalAppData="$ROOT/localappdata"
          BIN="$ROOT/hina"
          if [ "${RUNNER_OS:-}" = "Windows" ]; then BIN="$ROOT/hina.exe"; fi
          go build -o "$BIN" ./cmd/hina
          "$BIN" setup
          PORT=8791
          "$BIN" server --port "$PORT" &
          SRV_PID=$!
          # On Git Bash for Windows, $! is the MSYS pseudo-pid, but taskkill and
          # tasklist operate on the native Windows PID. Translate via
          # /proc/<pid>/winpid (fall back to the bash pid if unavailable). Without
          # this the kill targets the wrong PID and hina.exe leaks as an orphan,
          # which is exactly the regression this smoke is meant to catch.
          WINPID="$SRV_PID"
          if [ "${RUNNER_OS:-}" = "Windows" ]; then
            WINPID="$(cat /proc/$SRV_PID/winpid 2>/dev/null || echo "$SRV_PID")"
          fi
          stop_server() {
            if [ "${RUNNER_OS:-}" = "Windows" ]; then
              taskkill //PID "$WINPID" //T //F >/dev/null 2>&1 || true
            else
              kill "$SRV_PID" 2>/dev/null || true
            fi
          }
          server_alive() {
            if [ "${RUNNER_OS:-}" = "Windows" ]; then
              tasklist //FI "PID eq $WINPID" //NH 2>/dev/null | grep -qw "$WINPID"
            else
              kill -0 "$SRV_PID" 2>/dev/null
            fi
          }
          ready=0
          for _ in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:$PORT/readyz" >/dev/null 2>&1; then ready=1; break; fi
            sleep 0.5
          done
          if [ "$ready" != "1" ]; then
            echo "server never became ready"; stop_server; exit 1
          fi
          echo "readyz OK"
          # Terminate and assert the process is gone (no orphan / clean stop).
          stop_server
          gone=0
          for _ in $(seq 1 40); do
            if ! server_alive; then gone=1; break; fi
            sleep 0.25
          done
          if [ "$gone" != "1" ]; then echo "server process lingered after termination"; exit 1; fi
          echo "server stopped, no orphan"

  cross-compile:
    name: cross-compile targets
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.x"
      - name: Cross-compile all Tier-1 targets
        shell: bash
        run: |
          set -e
          for t in windows/amd64 darwin/arm64 darwin/amd64 linux/amd64 linux/arm64; do
            GOOS=${t%/*} GOARCH=${t#*/} go build -o /dev/null ./cmd/hina && echo "$t OK"
          done

  web:
    name: web (typecheck & build)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  gen-check:
    name: generated TS in sync
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.x"
      - name: Regenerate TS types and check for drift
        run: |
          go run github.com/gzuidhof/tygo@latest generate
          git diff --exit-code web/src/lib/api.gen.ts web/src/lib/events.gen.ts

  e2e:
    name: e2e (playwright)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.x"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: npx playwright install --with-deps chromium
        working-directory: web
      - name: Run e2e against the embedded binary
        run: |
          set -e
          go build -o /tmp/hina ./cmd/hina
          XDG_CONFIG_HOME="$(mktemp -d)"
          XDG_DATA_HOME="$(mktemp -d)"
          export XDG_CONFIG_HOME XDG_DATA_HOME
          PW="$(/tmp/hina setup | sed -n 's/.*password: //p' | tr -d ' ')"
          export E2E_BOOTSTRAP_PW="$PW"
          export E2E_BASE_URL="http://127.0.0.1:8803"
          /tmp/hina server --port 8803 &
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8803/readyz >/dev/null 2>&1; then
              break
            fi
            sleep 0.5
          done
          npm --prefix web run e2e
